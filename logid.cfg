devices:
({
  name: "MX Master 3S";

  smartshift:
  {
    on: true;
    threshold: 15;
    torque: 50;
  };

  hiresscroll:
  {
    hires: true;
    invert: false;
    target: false;
  };

  thumbwheel:
  {
    divert: true;
    invert: false;
    left:
    {
      mode: "OnInterval";
      interval: 1;
      action =
      {
        type: "Keypress";
        keys: ["KEY_VOLUMEDOWN"];
      };
    };
    right:
    {
      mode: "OnInterval";
      interval: 1;
      action =
      {
        type: "Keypress";
        keys: ["KEY_VOLUMEUP"];
      };
    };
  };

  dpi: 1400;

  buttons:
  (
    {
      cid: 0xc4;
      action =
      {
        type: "ToggleSmartShift";
      };
    },
    {
      cid: 0xc3;
      action =
      {
        type: "Gestures";
        gestures:
        (
          {
            direction: "None";
            mode: "OnRelease";
            action =
            {
              type: "Keypress";
              keys: ["KEY_LEFTMETA", "KEY_T"];
            };
          },
          {
            direction: "Up";
            mode: "OnRelease";
            action =
            {
              type: "Keypress";
              keys: ["KEY_LEFTMETA", "KEY_O"];
            };
          },
          {
            direction: "Down";
            mode: "OnRelease";
            action =
            {
              type: "Keypress";
              keys: ["KEY_LEFTMETA", "KEY_D"];
            };
          },
          {
            direction: "Left";
            mode: "OnRelease";
            action =
            {
              type: "Keypress";
              keys: ["KEY_LEFTCTRL", "KEY_LEFTMETA", "KEY_LEFT"];
            };
          },
          {
            direction: "Right";
            mode: "OnRelease";
            action =
            {
              type: "Keypress";
              keys: ["KEY_LEFTCTRL", "KEY_LEFTMETA", "KEY_RIGHT"];
            };
          }
        );
      };
    },
    {
      cid: 0x56;
      action =
      {
        type: "Keypress";
        keys: ["KEY_FORWARD"];
      };
    },
    {
      cid: 0x53;
      action =
      {
        type: "Keypress";
        keys: ["KEY_BACK"];
      };
    }
  );
});